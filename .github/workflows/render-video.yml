name: Render Banach-Tarski Video

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: "URL to the audio file (MP3). Leave empty to use the bundled audio."
        required: false
        type: string
        default: ""

env:
  NODE_VERSION: "18"

jobs:
  # ============================================================
  # Pre-render validation
  # ============================================================
  pre-validate:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.validate.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Run pre-render alignment check
        id: validate
        run: |
          echo "Pre-render alignment check..."
          python3 scripts/validate_alignment.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "::notice::Pre-render validation PASSED"
          else
            echo "status=needs-adjustment" >> $GITHUB_OUTPUT
            echo "::warning::Alignment needs adjustment before rendering"
          fi

  # ============================================================
  # Render all 4 video chunks in parallel
  # ============================================================
  render-chunk-1:
    needs: pre-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Validate alignment
        run: python3 scripts/validate_alignment.py
      - name: Render Chunk 1 (Phase 1, 1342 frames)
        run: |
          npx remotion render Chunk-Phase1 \
            --codec=h264 --quality 100 --scale 1 --concurrency 2 --out=chunk-1.mp4
      - name: Upload chunk-1
        uses: actions/upload-artifact@v4
        with:
          name: chunk-1
          path: chunk-1.mp4
          retention-days: 5

  render-chunk-2:
    needs: pre-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Validate alignment
        run: python3 scripts/validate_alignment.py
      - name: Render Chunk 2 (Phase 2, 1174 frames)
        run: |
          npx remotion render Chunk-Phase2 \
            --codec=h264 --quality 100 --scale 1 --concurrency 2 --out=chunk-2.mp4
      - name: Upload chunk-2
        uses: actions/upload-artifact@v4
        with:
          name: chunk-2
          path: chunk-2.mp4
          retention-days: 5

  render-chunk-3:
    needs: pre-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Validate alignment
        run: python3 scripts/validate_alignment.py
      - name: Render Chunk 3 (Phase 3, 1509 frames)
        run: |
          npx remotion render Chunk-Phase3 \
            --codec=h264 --quality 100 --scale 1 --concurrency 2 --out=chunk-3.mp4
      - name: Upload chunk-3
        uses: actions/upload-artifact@v4
        with:
          name: chunk-3
          path: chunk-3.mp4
          retention-days: 5

  render-chunk-4:
    needs: pre-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Validate alignment
        run: python3 scripts/validate_alignment.py
      - name: Render Chunk 4 (Phase 4, 2012 frames)
        run: |
          npx remotion render Chunk-Phase4 \
            --codec=h264 --quality 100 --scale 1 --concurrency 2 --out=chunk-4.mp4
      - name: Upload chunk-4
        uses: actions/upload-artifact@v4
        with:
          name: chunk-4
          path: chunk-4.mp4
          retention-days: 5

  # ============================================================
  # Concatenate chunks + merge with audio
  # ============================================================
  assemble:
    needs: [render-chunk-1, render-chunk-2, render-chunk-3, render-chunk-4]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download chunk-1
        uses: actions/download-artifact@v4
        with:
          name: chunk-1
          path: .

      - name: Download chunk-2
        uses: actions/download-artifact@v4
        with:
          name: chunk-2
          path: .

      - name: Download chunk-3
        uses: actions/download-artifact@v4
        with:
          name: chunk-3
          path: .

      - name: Download chunk-4
        uses: actions/download-artifact@v4
        with:
          name: chunk-4
          path: .

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Get audio file
        run: |
          if [ -n "${{ github.event.inputs.audio_url }}" ]; then
            curl -L "${{ github.event.inputs.audio_url }}" -o audio.mp3
          elif [ -f "assets/audio.mp3" ]; then
            cp assets/audio.mp3 audio.mp3
          else
            echo "ERROR: No audio file found."
            exit 1
          fi
          ls -lh audio.mp3

      - name: List downloaded files
        run: |
          echo "=== Files in workspace ==="
          ls -la *.mp4 2>/dev/null || echo "No mp4 files in root"
          echo "=== All files ==="
          find . -name "*.mp4" -o -name "*.mp3" | head -20

      - name: Concatenate video chunks serially
        run: |
          echo "Concatenating: chunk-1 → chunk-2 → chunk-3 → chunk-4"
          printf "file 'chunk-1.mp4'\nfile 'chunk-2.mp4'\nfile 'chunk-3.mp4'\nfile 'chunk-4.mp4'\n" > concat.txt
          cat concat.txt
          ffmpeg -y -f concat -safe 0 -i concat.txt \
            -c:v libx264 -preset slow -crf 18 \
            -pix_fmt yuv420p -r 60 -s 1080x1920 \
            concatenated.mp4
          echo "Concatenated duration:"
          ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 concatenated.mp4

      - name: Validate post-concat alignment
        run: |
          VIDEO_DUR=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 concatenated.mp4)
          AUDIO_DUR=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.mp3)
          DRIFT=$(python3 -c "print(abs(float('$VIDEO_DUR') - float('$AUDIO_DUR')))")
          echo "Video: ${VIDEO_DUR}s | Audio: ${AUDIO_DUR}s | Drift: ${DRIFT}s"
          python3 -c "
          drift = float('$DRIFT')
          if drift > 0.5:
              print(f'DRIFT TOO LARGE: {drift}s')
              exit(1)
          print(f'Alignment OK: drift={drift}s')
          "

      - name: Merge video with audio
        run: |
          ffmpeg -y -i concatenated.mp4 -i audio.mp3 \
            -c:v libx264 -preset slow -crf 17 \
            -c:a aac -b:a 320k \
            -pix_fmt yuv420p -r 60 -s 1080x1920 \
            -shortest -map 0:v:0 -map 1:a:0 \
            Banach-Tarski-Final.mp4
          echo "Final video:"
          ls -lh Banach-Tarski-Final.mp4

      - name: Run final alignment validation
        run: python3 scripts/validate_alignment.py

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: Banach-Tarski-Final.mp4
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "video-${{ github.run_id }}"
          name: "Banach-Tarski Video #${{ github.run_number }}"
          body: |
            🎬 **Banach-Tarski Paradox Video** — Build #${{ github.run_number }}

            ✅ **Alignment:** Per-second audio-visual sync validated

            **Specs:**
            - Resolution: 1080x1920 (9:16 vertical)
            - Frame rate: 60 fps
            - Duration: ~100.62s (matches audio exactly)
            - Audio: AAC 320kbps (ElevenLabs narration)
            - Drift: < 0.01s

            **Chunks (rendered in parallel):**
            1. Phase 1 — Solid Sphere (0:00 - 0:22.36) ✅
            2. Phase 2 — Split/Decomposition (0:22.36 - 0:41.93) ✅
            3. Phase 3 — Reassembly/Duplication (0:41.93 - 1:07.08) ✅
            4. Phase 4 — Infinity State (1:07.08 - 1:40.62) ✅
          files: Banach-Tarski-Final.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
