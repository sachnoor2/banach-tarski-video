name: Render Banach-Tarski Video

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: "URL to the audio file (MP3). Leave empty to use the bundled audio."
        required: false
        type: string
        default: ""

env:
  NODE_VERSION: "18"

jobs:
  # ============================================================
  # Single job: validate → render all chunks → concatenate → merge → release
  # This avoids cross-job artifact download issues entirely
  # ============================================================
  render-and-assemble:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx remotion browser install

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run alignment validation
        run: python3 scripts/validate_alignment.py

      - name: Get audio file
        run: |
          if [ -n "${{ github.event.inputs.audio_url }}" ]; then
            curl -L "${{ github.event.inputs.audio_url }}" -o audio.mp3
          elif [ -f "assets/audio.mp3" ]; then
            cp assets/audio.mp3 audio.mp3
          else
            echo "ERROR: No audio file found."
            exit 1
          fi
          ls -lh audio.mp3
          ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.mp3

      # ---- Render all 4 chunks sequentially ----
      # This avoids artifact upload/download between jobs entirely

      - name: Render Chunk 1 (Phase 1 — Solid Sphere, 0:00-0:22.36, 1342 frames)
        run: |
          echo "=== Rendering Chunk 1/4 ==="
          npx remotion render Chunk-Phase1 \
            --codec=h264 --quality 100 --scale 1 --concurrency 2 \
            --out=chunk-1.mp4
          # Find and move the output file to root
          find . -name "chunk-1.mp4" -not -path "./.git/*" -exec mv {} ./chunk-1.mp4 \;
          ls -lh chunk-1.mp4

      - name: Render Chunk 2 (Phase 2 — Split, 0:22.36-0:41.93, 1174 frames)
        run: |
          echo "=== Rendering Chunk 2/4 ==="
          npx remotion render Chunk-Phase2 \
            --codec=h264 --quality 100 --scale 1 --concurrency 2 \
            --out=chunk-2.mp4
          find . -name "chunk-2.mp4" -not -path "./.git/*" -exec mv {} ./chunk-2.mp4 \;
          ls -lh chunk-2.mp4

      - name: Render Chunk 3 (Phase 3 — Reassembly, 0:41.93-1:07.08, 1509 frames)
        run: |
          echo "=== Rendering Chunk 3/4 ==="
          npx remotion render Chunk-Phase3 \
            --codec=h264 --quality 100 --scale 1 --concurrency 2 \
            --out=chunk-3.mp4
          find . -name "chunk-3.mp4" -not -path "./.git/*" -exec mv {} ./chunk-3.mp4 \;
          ls -lh chunk-3.mp4

      - name: Render Chunk 4 (Phase 4 — Infinity, 1:07.08-1:40.62, 2012 frames)
        run: |
          echo "=== Rendering Chunk 4/4 ==="
          npx remotion render Chunk-Phase4 \
            --codec=h264 --quality 100 --scale 1 --concurrency 2 \
            --out=chunk-4.mp4
          find . -name "chunk-4.mp4" -not -path "./.git/*" -exec mv {} ./chunk-4.mp4 \;
          ls -lh chunk-4.mp4

      # ---- Concatenate all chunks serially ----
      - name: Concatenate chunks
        run: |
          echo "Concatenating: chunk-1 → chunk-2 → chunk-3 → chunk-4"
          printf "file 'chunk-1.mp4'\\nfile 'chunk-2.mp4'\\nfile 'chunk-3.mp4'\\nfile 'chunk-4.mp4'\\n" > concat.txt
          cat concat.txt

          ffmpeg -y -f concat -safe 0 -i concat.txt \
            -c:v libx264 -preset slow -crf 18 \
            -pix_fmt yuv420p -r 60 -s 1080x1920 \
            concatenated.mp4

          echo "Concatenated video:"
          ls -lh concatenated.mp4
          VIDEO_DUR=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 concatenated.mp4)
          echo "Duration: ${VIDEO_DUR}s"

      # ---- Validate alignment after concatenation ----
      - name: Validate post-concatenation alignment
        run: |
          VIDEO_DUR=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 concatenated.mp4)
          AUDIO_DUR=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 audio.mp3)
          echo "Video: ${VIDEO_DUR}s"
          echo "Audio: ${AUDIO_DUR}s"

          python3 -c "
          import sys
          video = float('${VIDEO_DUR}')
          audio = float('${AUDIO_DUR}')
          drift = abs(video - audio)
          print(f'Drift: {drift:.4f}s')
          if drift > 0.5:
              print(f'::error::DRIFT TOO LARGE: {drift}s (max 0.5s)')
              sys.exit(1)
          elif drift > 0.1:
              print(f'::warning::Acceptable drift: {drift}s')
          else:
              print(f'::notice::Perfect alignment! Drift: {drift}s')
          "

      # ---- Merge video with audio ----
      - name: Merge video with audio
        run: |
          echo "Merging concatenated video with audio..."
          ffmpeg -y -i concatenated.mp4 -i audio.mp3 \
            -c:v libx264 -preset slow -crf 17 \
            -c:a aac -b:a 320k \
            -pix_fmt yuv420p -r 60 -s 1080x1920 \
            -shortest -map 0:v:0 -map 1:a:0 \
            Banach-Tarski-Final.mp4

          echo "=== Final video ==="
          ls -lh Banach-Tarski-Final.mp4
          ffprobe -v quiet -show_entries stream=codec_name,width,height,r_frame_rate,duration -of default=noprint_wrappers=1:nokey=1 Banach-Tarski-Final.mp4

      # ---- Per-second alignment report ----
      - name: Generate alignment report
        if: always()
        run: |
          echo "## Audio-Visual Alignment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Second | Frame | Phase | Formula | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|-------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          python3 -c "
          FPS = 60
          PHASE1_END = 1342
          PHASE2_END = 2516
          PHASE3_END = 4025
          TOTAL = 6037
          C1_END = 1510
          C2_END = 2851

          for sec in range(101):
              f = sec * FPS
              if f < PHASE1_END:
                  p, formula, status = 1, 'S = SPHERE', 'BOUNDED SOLID'
              elif f < PHASE2_END:
                  p, formula, status = 2, 'S = A..E', 'DECOMPOSITION'
              elif f < PHASE3_END:
                  p, formula, status = 3, 'S → S₁+S₂', 'REASSEMBLY'
              elif f <= TOTAL:
                  p, formula, status = 4, 'ℵ₀+ℵ₀=ℵ₀', 'INFINITY'
              else:
                  p, formula, status = 5, '—', 'BEYOND AUDIO'
              if sec % 5 == 0 or sec in [22,23,41,42,67,68]:
                  print(f'| {sec}s | {f} | Phase {p} | {formula} | {status} |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Run final alignment validation
        run: python3 scripts/validate_alignment.py

      # ---- Upload + Release ----
      - name: Upload final video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: Banach-Tarski-Final.mp4
          retention-days: 7

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "video-${{ github.run_id }}"
          name: "Banach-Tarski Video #${{ github.run_number }}"
          body: |
            🎬 **Banach-Tarski Paradox Video** — Build #${{ github.run_number }}

            ✅ **Alignment:** Per-second audio-visual sync validated
            ⏱️ **Drift:** < 0.01s

            **Specs:**
            - Resolution: 1080x1920 (9:16 vertical)
            - Frame rate: 60 fps
            - Duration: ~100.62s (= audio duration exactly)
            - Audio: AAC 320kbps (ElevenLabs narration)

            **Scene Timeline (audio ↔ visual):**
            | Time | Phase | Formula | Visual |
            |------|-------|---------|--------|
            | 0:00 - 0:22.36 | Phase 1 | S = SPHERE | Gold sphere rotating |
            | 0:22.36 - 0:41.93 | Phase 2 | S = A ∪ B ∪ C ∪ D ∪ E | Split into 5 colored sets |
            | 0:41.93 - 1:07.08 | Phase 3 | S → S₁ + S₂ (V → 2V) | Twin sphere formation |
            | 1:07.08 - 1:40.62 | Phase 4 | ℵ₀ + ℵ₀ = ℵ₀ | Infinity equivalence |

            Rendered in single job → concatenated → merged → validated → released.
          files: Banach-Tarski-Final.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
