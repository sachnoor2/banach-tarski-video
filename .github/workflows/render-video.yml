name: Render Banach-Tarski Video

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: "URL to the audio file (MP3). Leave empty to use the bundled audio."
        required: false
        type: string
        default: ""

env:
  NODE_VERSION: "18"

jobs:
  # ================================================================
  # Jobs 1-7: Render all 7 video chunks in parallel
  # Each job runs on its own runner for maximum speed
  # ================================================================
  render-chunk-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Render Chunk 1 — Intro+Birth (0:00 - 0:18.02, 1081 frames)
        run: |
          npx remotion render src/index.ts Chunk-1 chunk-1.mp4 \
            --codec=h264 \
            --quality=100 \
            --scale=1 \
            --concurrency=2
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-1
          path: chunk-1.mp4
          retention-days: 1

  render-chunk-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Render Chunk 2 — Shatter (0:18.02 - 0:28.57, 633 frames)
        run: |
          npx remotion render src/index.ts Chunk-2 chunk-2.mp4 \
            --codec=h264 \
            --quality=100 \
            --scale=1 \
            --concurrency=2
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-2
          path: chunk-2.mp4
          retention-days: 1

  render-chunk-3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Render Chunk 3 — Drift (0:28.57 - 0:39.75, 671 frames)
        run: |
          npx remotion render src/index.ts Chunk-3 chunk-3.mp4 \
            --codec=h264 \
            --quality=100 \
            --scale=1 \
            --concurrency=2
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-3
          path: chunk-3.mp4
          retention-days: 1

  render-chunk-4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Render Chunk 4 — Assemble (0:39.75 - 0:52.80, 783 frames)
        run: |
          npx remotion render src/index.ts Chunk-4 chunk-4.mp4 \
            --codec=h264 \
            --quality=100 \
            --scale=1 \
            --concurrency=2
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-4
          path: chunk-4.mp4
          retention-days: 1

  render-chunk-5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Render Chunk 5 — Reveal (0:52.80 - 1:05.22, 745 frames)
        run: |
          npx remotion render src/index.ts Chunk-5 chunk-5.mp4 \
            --codec=h264 \
            --quality=100 \
            --scale=1 \
            --concurrency=2
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-5
          path: chunk-5.mp4
          retention-days: 1

  render-chunk-6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Render Chunk 6 — Infinity (1:05.22 - 1:14.08, 932 frames)
        run: |
          npx remotion render src/index.ts Chunk-6 chunk-6.mp4 \
            --codec=h264 \
            --quality=100 \
            --scale=1 \
            --concurrency=2
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-6
          path: chunk-6.mp4
          retention-days: 1

  render-chunk-7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx remotion browser install
      - name: Render Chunk 7 — Outro (1:14.08 - 1:40.62, 1192 frames)
        run: |
          npx remotion render src/index.ts Chunk-7 chunk-7.mp4 \
            --codec=h264 \
            --quality=100 \
            --scale=1 \
            --concurrency=2
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-7
          path: chunk-7.mp4
          retention-days: 1

  # ================================================================
  # Final job: Concatenate chunks serially and merge with audio
  # ================================================================
  assemble:
    needs: [render-chunk-1, render-chunk-2, render-chunk-3, render-chunk-4, render-chunk-5, render-chunk-6, render-chunk-7]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Get audio file
        run: |
          if [ -n "${{ github.event.inputs.audio_url }}" ]; then
            echo "Downloading audio from URL..."
            curl -L "${{ github.event.inputs.audio_url }}" -o audio.mp3
          elif [ -f "assets/audio.mp3" ]; then
            echo "Using bundled audio..."
            cp assets/audio.mp3 audio.mp3
          else
            echo "ERROR: No audio file found."
            exit 1
          fi
          ls -lh audio.mp3

      - name: Concatenate 7 chunks → single video
        run: |
          echo "=== Chunk files ==="
          find artifacts -name "chunk-*.mp4" -exec ls -lh {} \;
          
          # Build concat list in order
          WORKDIR=$(pwd)
          for i in 1 2 3 4 5 6 7; do
            echo "file '${WORKDIR}/artifacts/chunk-${i}/chunk-${i}.mp4'" >> concat.txt
          done
          cat concat.txt

          ffmpeg -y -f concat -safe 0 -i concat.txt \
            -c:v libx264 -preset slow -crf 18 \
            -pix_fmt yuv420p \
            -r 60 -s 1080x1920 \
            concatenated.mp4

          DUR=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 concatenated.mp4)
          echo "Concatenated duration: ${DUR}s"
          ls -lh concatenated.mp4

      - name: Verify video-audio alignment
        run: |
          V=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 concatenated.mp4)
          A=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 audio.mp3)
          python3 -c "
          v, a = float('$V'), float('$A')
          drift = abs(v - a)
          print(f'Video: {v:.3f}s  Audio: {a:.3f}s  Drift: {drift:.3f}s')
          if drift > 1.0: print(f'::warning::Drift: {drift:.3f}s')
          else: print(f'::notice::Good alignment, drift: {drift:.3f}s')
          "

      - name: Merge video + audio → final output
        run: |
          ffmpeg -y -i concatenated.mp4 -i audio.mp3 \
            -c:v libx264 -preset slow -crf 17 \
            -c:a aac -b:a 320k \
            -pix_fmt yuv420p \
            -r 60 -s 1080x1920 \
            -shortest \
            -map 0:v:0 -map 1:a:0 \
            Banach-Tarski-Final.mp4

          echo "=== Final video ==="
          ls -lh Banach-Tarski-Final.mp4

      - name: Upload final video artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: Banach-Tarski-Final.mp4
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "video-${{ github.run_id }}"
          name: "Banach-Tarski Video #${{ github.run_number }}"
          body: |
            🎬 **Banach-Tarski Paradox Video** — Build #${{ github.run_number }}

            | Property | Value |
            |----------|-------|
            | Resolution | 1080×1920 (9:16 vertical) |
            | Frame rate | 60 fps |
            | Duration | 100.62s (6037 frames) |
            | Audio | AAC 320kbps (ElevenLabs narration) |
            | Encoding | H.264, CRF 17 |

            **Chunks** (rendered in parallel on 7 runners):
            1. Intro+Birth (1081 fr) → 2. Shatter (633 fr) → 3. Drift (671 fr) →
            4. Assemble (783 fr) → 5. Reveal (745 fr) → 6. Infinity (932 fr) →
            7. Outro (1192 fr)

            Chunks concatenated serially → merged with audio → released.
          files: Banach-Tarski-Final.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
