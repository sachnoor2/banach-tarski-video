name: Validate Audio-Visual Alignment

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Render Banach-Tarski Video"]
    types: [completed]

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.validate.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Run alignment validator
        id: validate
        continue-on-error: true
        run: |
          echo "Running per-second audio-visual alignment check..."
          python3 scripts/validate_alignment.py
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -ne 0 ]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "::error::Alignment validation FAILED"
          else
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "::notice::Alignment validation PASSED"
          fi

      - name: Set default output
        if: steps.validate.outcome == 'failure' && steps.validate.outputs.status == ''
        run: echo "status=failed" >> $GITHUB_OUTPUT

      - name: Report alignment results
        if: always()
        run: |
          echo "## Audio-Visual Alignment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 scripts/validate_alignment.py >> $GITHUB_STEP_SUMMARY 2>&1 || true

  rerender-on-failure:
    needs: validate
    if: needs.validate.outputs.status == 'failed'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Trigger rerender
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'render-video.yml',
              ref: 'main',
            });
            core.notice('Alignment check failed — triggered rerender');
